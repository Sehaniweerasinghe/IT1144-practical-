<head>

}

    color:#1a202c;
	font-size:1.6rem;

<body>
<h1>student registration form</h1>
<form>
<label>Full Name</label>
<input type="text"placeholder= " Full Name"> </input>

<br><br>
<label>E-mail Adderess</label>
<input type="email"placeholder="student@gmail.com"></input><br><br>
<label>Password</label>
<input type="password"placeholder="enter8characters"></input><br><br>
<label>Age</label>
<input type="number"placeholder="20"></input><br><br>
<label>Phone number</label>
<input type="tel"></input><br><br>


<label>Gender</label><br>
Male</label>
<label><input type="radio"name="Gender">
Female</label>
<label><input type="radio"name="Gender">


<p>skills</p>
<label>
<input type="checkbox" name="skills"></input>
html</label>
<label>
<input type="checkbox" name="skills"></input>
Java</label>
<label>
<input type="checkbox" name="skills"></input>
C</label>
<label>
<input type="checkbox" name="skills"></input>
C++</label>
<label>
<input type="checkbox" name="skills"></input>
Python</label><br><br>

<label>Year of Study</label>
<select name="Year">
<option>Select Year</option>
<option value="First Year">First Year</option>
<option value="Second Year">Second Year</option>
<option value="Third Year">Third Year</option>
<option value="Fourth Year">Fourth Year</option>
</select><br><br>

<label>About You</label><br>
<textarea rows="4"placeholder="Tell us about you"></textarea><br><br>


<button type="submit">Submit</button>

</form>
</body>
</html>
